<style>
:root{--red:#E10600;--silver:#b0b2b6;--white:#ededed;--bg0:#15171c;--bg1:#0a0a0b;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',system-ui,sans-serif;color:var(--white);min-height:100vh;
background:radial-gradient(120% 90% at 50% 0%,var(--bg0),var(--bg1) 70%);
display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.wrap{max-width:440px}
.emblem{width:110px;margin:0 auto 18px;display:block;filter:drop-shadow(0 8px 18px rgba(0,0,0,.6))}
.check{font-size:40px;margin-bottom:6px}
h1{font-weight:800;font-style:italic;font-size:30px;letter-spacing:.5px}
.accent{width:64px;height:5px;background:var(--red);border-radius:3px;margin:14px auto}
p{color:var(--silver);font-weight:600;font-size:16px;line-height:1.6;margin-bottom:8px}
a.btn{display:inline-block;margin-top:20px;background:linear-gradient(180deg,#e30800,#b60500);color:#fff;
text-decoration:none;font-weight:800;font-style:italic;font-size:16px;padding:15px 26px;border-radius:14px;transition:.15s}
a.btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
a.sec{display:block;margin-top:16px;color:var(--silver);text-decoration:none;font-size:14px}
a.sec:hover{color:#fff}
.foot{color:#8b8f97;font-size:12.5px;margin-top:26px;font-style:italic}
